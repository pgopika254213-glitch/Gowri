<!DOCTYPE html>
<html>
    <head>
        <title>HTML</title>
    </head>
    <body>
        <button onclick="handledClick1()">Click Me</button>
        <button onclick="handledClick2()">Prompt</button>
        <button onclick="handledClick3()">Confirm</button>
        <script>
            function handledClick1(){
                alert("Button Clicked");
            }
            function handledClick2(){
                let name=prompt("what is your name?");
                alert("Hello,"+name+"!");
            }
            function handledClick3(){
                let x=confirm("Are you sure you want to delete this item?");
                if(x){
                    alert("Item deleted.");
                }
                else{
                    alert("Item not deleted.");
                }
            }
        </script>
    </body>
</html>
